ai_usage_summary: |
  AI tools were used for code review, documentation cleanup, and ranking
  pipeline hardening. No candidate data is sent to hosted LLM APIs. The ranker
  runs entirely offline using deterministic standard-library heuristics.

methodology_summary: |
  Three-pass offline heuristic ranker. Pass 1 streams all candidates and keeps the
  top 8,000 by fast title, skill, search/vector, production, and elite-company
  signals. Pass 2 deeply scores retrieval/ranking/evaluation fit, explicit vector
  DB experience, production shipping evidence, behavioral availability, notice
  period, open-to-work, location, and JD red flags. Pass 3 utilizes an ONNX-optimized
  Semantic Engine (MiniLM-L6) running locally on CPU to score the top 300 candidates
  against key JD phrases. Honeypot checks catch impossible tenure, inflated experience,
  expert zero-duration skills, domain conflicts, and impossible durations. Output is a
  deterministic UTF-8 top-100 CSV.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
  no_network_calls: true
  no_gpu_required: true
