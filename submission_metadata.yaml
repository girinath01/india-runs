ai_usage_summary: |
  Used Claude (Antigravity) for architecture discussion, code review, and
  structuring the multi-signal scoring framework. All JD analysis, signal
  design decisions, weight calibration, and disqualifier logic were built
  and validated by the team. No candidate data was fed to any LLM.
  The ranking runs entirely offline with no API calls at inference time.

methodology_summary: |
  Multi-signal hybrid scorer — 7 components, no GPU, no network.
  Skills match (26%): proficiency+endorsement+duration weighted keyword overlap
  against JD requirements; also scans profile summary and headline for JD concept
  areas to catch plain-language candidates without buzzword skills lists.
  Title/career fit (22%): current title + career history with consulting detection
  via the industry field (more reliable than company name matching).
  Production experience (20%): NLP on career descriptions — production signals
  (deployed, shipped, at scale, real users) vs research-only signals, weighted
  by job duration. Experience years (12%): curve peaking at 6-7yr per JD sweet
  spot. Behavioral signals (10%): 12 sub-signals — open-to-work, activity
  recency, response rate, interview completion, GitHub activity, notice period,
  profile completeness, recruiter saves, assessment scores, response time,
  active applications, verified contacts. Location (6%), Education (4%).
  Disqualifier multipliers for consulting-only careers (0.12-0.72x), non-tech
  titles (0.18x), CV/Speech/Robotics focus (0.22-0.52x). Honeypot detection via
  4 impossibility checks. Runtime ~90s for 100K candidates on CPU.

