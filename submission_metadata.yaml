ai_usage_summary: |
  Used Claude (Antigravity) for architecture discussion, code review, and
  structuring the multi-signal scoring framework. All JD analysis, signal
  design decisions, weight calibration, and disqualifier logic were built
  and validated by the team. No candidate data was fed to any LLM.
  The ranking runs entirely offline with no API calls at inference time.

methodology_summary: |
  Multi-signal hybrid scorer — 2 passes, no GPU, no network.
  Pass 1 filters strictly on positive fast_score (drops obvious non-tech).
  Pass 2 deep scores top 500 candidates.
  Search/Retrieval (45%): LTR, BM25, and IR explicit hits.
  Vector DBs (25%): Massive boosts for explicit Vector DB operational experience.
  Production experience (20%): Shipped/scaled/deployed signals vs purely academic.
  Behavioral Base (10%): Recency, github activity, connections, assessments.
  Massive Uncapped Penalties: Not open to work, extreme notice periods, job hoppers,
  and purely consulting-only careers receive -0.35 to -0.40 linear penalties to mathematically drop them out.
  Honeypot detection via 4 impossibility checks. Runtime ~23s for 100K candidates on CPU.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
